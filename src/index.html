<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Wuwa Live2D Viewer</title>

    <script src="https://unpkg.com/@esotericsoftware/spine-player@4.1.*/dist/iife/spine-player.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@esotericsoftware/spine-player@4.1.*/dist/spine-player.min.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        #player-container {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>

    <div id="player-container"></div>

    <script>
        new spine.SpinePlayer("player-container", {
            skelUrl: "c_luosela_01.skel",
            atlasUrl: "c_luosela_01.atlas",
            premultipliedAlpha: false,
            showControls: false,
            alpha: true,
            success: function (player) {
                let animations = player.skeleton.data.animations;
                let defaultAnim = animations[0].name;
                player.setAnimation(defaultAnim, true);
                player.play();
            }
        });
    </script>

</body>

</html>
